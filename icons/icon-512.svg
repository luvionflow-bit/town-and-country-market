<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#2d6a4f"/>
  <g transform="translate(256,240)">
    <!-- Store roof -->
    <polygon points="-120,-70 0,-130 120,-70" fill="#fff" opacity="0.95"/>
    <!-- Store body -->
    <rect x="-108" y="-70" width="216" height="140" rx="8" fill="#fff" opacity="0.9"/>
    <!-- Door -->
    <rect x="-22" y="5" width="44" height="65" rx="6" fill="#2d6a4f" opacity="0.8"/>
    <!-- Door handle -->
    <circle cx="14" cy="40" r="3" fill="#fff" opacity="0.7"/>
    <!-- Windows -->
    <rect x="-92" y="-50" width="52" height="38" rx="4" fill="#2d6a4f" opacity="0.5"/>
    <rect x="40" y="-50" width="52" height="38" rx="4" fill="#2d6a4f" opacity="0.5"/>
    <!-- Window cross bars -->
    <line x1="-66" y1="-50" x2="-66" y2="-12" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="-92" y1="-31" x2="-40" y2="-31" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="66" y1="-50" x2="66" y2="-12" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="40" y1="-31" x2="92" y2="-31" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <!-- Awning -->
    <rect x="-108" y="-70" width="216" height="14" rx="4" fill="#1b4332"/>
  </g>
  <!-- Text -->
  <text x="256" y="415" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="42" fill="#fff" letter-spacing="2">T&amp;C MARKET</text>
  <text x="256" y="450" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="20" fill="#b7e4c7" letter-spacing="3">ATOKA, OKLAHOMA</text>
</svg>
